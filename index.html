<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Omnishare - File Sharing</title>
  <link rel="stylesheet" href="Omni_Design.css">
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script type="module" src="supabaseClient.js"></script>
  <script type="module" src="main.js"></script>
</head>
<body>
  <!-- Auth Section -->
  <div id="authSection">
    <h1 class="brand">Omnishare</h1>
    <div class="container active-form">
      <div class="tab-buttons">
        <button id="loginTab" onclick="showForm('login')">Login</button>
        <button id="registerTab" onclick="showForm('register')">Register</button>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="form" onsubmit="login(event)">
        <h2>Login</h2>
        <input type="text" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <label><input type="checkbox"> Remember me</label>
        <button type="submit">Login</button>
        <p>Don't have an account? <a href="#" onclick="showForm('register')">Sign Up</a></p>
      </form>

      <!-- Register Form -->
      <form id="registerForm" class="form hidden" onsubmit="register(event)">
        <h2>Register</h2>
        <input type="text" placeholder="Username" required>
        <input type="email" placeholder="Email" required>
        <input type="password" placeholder="Password" required>
        <input type="password" placeholder="Confirm Password" required>
        <label><input type="checkbox" required> I accept the terms & conditions</label>
        <button type="submit">Register</button>
        <p>Already have an account? <a href="#" onclick="showForm('login')">Login</a></p>
      </form>
    </div>
  </div>

  <!-- File Upload Section -->
  <div id="fileSection" class="hidden">
    <div class="container">
      <div style="display: flex; justify-content: space-between; align-items: center;">
        <h1 class="brand">Omnishare</h1>
        <div id="userInfo">
          <span id="userProfile"></span>
          <span id="storageUsed" style="font-size: 12px; margin-left: 10px;"></span>
        </div>
      </div>

      <section class="upload-section">
        <h2>Upload a file to share</h2>
        <label for="expiry">Set file expiry:</label>
        <select id="expiry">
          <option value="15">15 minutes</option>
          <option value="60">1 hour</option>
          <option value="1440">1 day</option>
        </select>

        <div class="upload-box" onclick="document.getElementById('fileInput').click();">
          Drag & drop files here or click to upload
          <input type="file" id="fileInput" hidden />
        </div>

        <div class="link-container" id="linkContainer" style="display: none;">
          <input type="text" id="fileLink" readonly>
          <button id="copyBtn">Copy</button>
        </div>
        <p class="success-message" id="uploadMessage">File uploaded successfully!</p>
      </section>

      <hr />

      <section class="download-section">
        <h2>Download a shared file</h2>
        <input type="text" id="downloadLink" placeholder="Paste file URL here">
        <button id="downloadBtn">Download</button>

        <div class="file-details" id="fileDetails" style="display: none;">
          <p><strong>File Name:</strong> <span id="fileName"></span></p>
          <p><strong>File Size:</strong> <span id="fileSize"></span></p>
          <p><strong>Expires In:</strong> <span id="expiresIn"></span></p>
        </div>
        <button class="logout-btn" onclick="logout()">Logout</button>
      </section>
    </div>
  </div>

  <!-- JavaScript -->
  <script>
  
  // Initialize Supabase
  const SUPABASE_URL = 'https://jljhoeckswnxzjbzpmex.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsamhvZWNrc3dueHpqYnpwbWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk2MTMzMDcsImV4cCI6MjA2NTE4OTMwN30.V1A2lGGznTUGrZhE3XLeeREOrYChl--wOPIUHjoxJ_A';
  const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

  // Show login/register forms
  function showForm(form) {
    const loginForm = document.getElementById("loginForm");
    const registerForm = document.getElementById("registerForm");
    const loginTab = document.getElementById("loginTab");
    const registerTab = document.getElementById("registerTab");
    const container = document.querySelector(".container");

    loginForm.classList.add("hidden");
    registerForm.classList.add("hidden");
    loginTab.classList.remove("active");
    registerTab.classList.remove("active");
    container.classList.remove("active-form");

    if (form === "login") {
      loginForm.classList.remove("hidden");
      loginTab.classList.add("active");
    } else {
      registerForm.classList.remove("hidden");
      registerTab.classList.add("active");
    }

    container.classList.add("active-form");
  }

  // Handle login
  async function login(event) {
    event.preventDefault();
  
    const email = document.querySelector('#loginForm input[type="text"]').value;
    const password = document.querySelector('#loginForm input[type="password"]').value;

    const { error } = await supabase.auth.signInWithPassword({
      email,
      password
    });

    if (error) {
      alert(`Login failed: ${error.message}`);
    } else {
      document.getElementById('authSection').classList.add('hidden');
      document.getElementById('fileSection').classList.remove('hidden');
    }
  }

  // Handle registration
  async function register(event) {
  event.preventDefault();
  
  const username = document.querySelector('#registerForm input[type="text"]').value;
  const email = document.querySelector('#registerForm input[type="email"]').value;
  const password = document.querySelector('#registerForm input[type="password"]').value;

  const { data, error } = await supabase.auth.signUp({
    email,
    password,
    options: {
      data: { username }
    }
  });

  if (error) {
    alert(`Registration failed: ${error.message}`);
  } else {
    alert('Registration successful! Check your email for confirmation.');
    showForm('login');
  }
}

  // Handle logout
  async function logout() {
    const { error } = await supabase.auth.signOut();
    if (error) {
      alert("Logout error: " + error.message);
    } else {
      document.getElementById('fileSection').classList.add('hidden');
      document.getElementById('authSection').classList.remove('hidden');
      showForm('login');
    }
  }

  // Check auth state on load
  document.addEventListener("DOMContentLoaded", async () => {
    const { data: { session } } = await supabase.auth.getSession();
    if (session) {
      document.getElementById('authSection').classList.add('hidden');
      document.getElementById('fileSection').classList.remove('hidden');
    } else {
      showForm('login');
    }
  });

  document.addEventListener('DOMContentLoaded', async () => {
  const { data: { session } } = await supabase.auth.getSession();
  
  if (session) {
    document.getElementById('authSection').classList.add('hidden');
    document.getElementById('fileSection').classList.remove('hidden');
  }
});
</script>
</body>
</html>
