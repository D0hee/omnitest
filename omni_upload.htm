<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Omnishare - File Sharing</title>
  <link rel="stylesheet" href="omni_upload.css" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    const SUPABASE_URL = 'https://jljhoeckswnxzjbzpmex.supabase.co';
    const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImpsamhvZWNrc3dueHpqYnpwbWV4Iiwicm9sZSI6ImFub24iLCJpYXQiOjE3NDk2MTMzMDcsImV4cCI6MjA2NTE4OTMwN30.V1A2lGGznTUGrZhE3XLeeREOrYChl--wOPIUHjoxJ_A';
    const supabase = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);
  </script>
</head>
<body>
  <div class="container">
    <h1 class="brand">Omnishare</h1>

    <section class="upload-section">
      <h2>Upload a file to share</h2>
      <label for="expiry">Set file expiry:</label>
      <select id="expiry">
        <option value="15">15 minutes</option>
        <option value="60">1 hour</option>
        <option value="1440">1 day</option>
      </select>

      <div class="upload-box" onclick="document.getElementById('fileInput').click();">
        Drag & drop files here or click to upload
        <input type="file" id="fileInput" hidden />
      </div>

      <div class="link-container" id="linkContainer" style="display: none;">
        <input type="text" id="fileLink" readonly value="https://omnishare.app/share/example" />
        <button onclick="copyLink()">Copy</button>
      </div>
      <p class="success-message" id="uploadMessage">File uploaded successfully!</p>
    </section>

    <hr />

    <section class="download-section">
      <h2>Download a shared file</h2>
      <input type="text" id="downloadLink" value="https://omnishare.app/share/zszreAop6" />
      <button onclick="downloadFile()">Download</button>

      <div class="file-details">
        <p><strong>File Name:</strong> example-file.txt</p>
        <p><strong>File Size:</strong> 1.2 MB</p>
        <p><strong>Expires In:</strong> Expires in 15 minutes</p>
      </div>
    </section>
  </div>

  <script>
  document.getElementById('fileInput').addEventListener('change', async function() {
    const file = this.files[0];
    const expiry = document.getElementById('expiry').value;

    async function uploadFile(file, expiryMinutes) {
      const token = crypto.randomUUID();
      const expiry = new Date(Date.now() + expiryMinutes * 60000);
  
  // Upload to storage
      const { data: uploadData, error: uploadError } = await supabase.storage
      .from('files')
      .upload(token, file);
  
    if (uploadError) throw uploadError;

  // Save to database
      const { error: dbError } = await supabase
      .from('files')
      .insert({
        user_id: supabase.auth.user().id,
        original_name: file.name,
        storage_path: uploadData.path,
        token,
        expires_at: expiry
      });
  
    if (dbError) throw dbError;
  
    return `${window.location.origin}/download.html?token=${token}`;
  }
  
    if (file) {
      try {
        const link = await uploadFile(file, parseInt(expiry));
        document.getElementById('fileLink').value = link;
        document.getElementById('linkContainer').style.display = 'flex';
        document.getElementById('uploadMessage').style.display = 'block';
      } catch (error) {
        alert(`Upload failed: ${error.message}`);
      }
    }
  });

  async function downloadFile(token) {
    const { data: fileData, error: fileError } = await supabase
    .from('files')
    .select()
    .eq('token', token)
    .single();
  
    if (fileError || !fileData) throw new Error('File not found');
    if (new Date(fileData.expires_at) < new Date()) throw new Error('File expired');

  // Get download URL
    const { data: urlData } = supabase.storage
      .from('files')
      .getPublicUrl(fileData.storage_path);
  
    return {
      url: urlData.publicUrl,
      name: fileData.original_name
    };
  }


    function copyLink() {
      const input = document.getElementById('fileLink');
      input.select();
      input.setSelectionRange(0, 99999);
      document.execCommand('copy');
      alert("Link copied to clipboard!");
    }

    function downloadFile() {
      alert("Download started!");
    }
  </script>
</body>
</html>
